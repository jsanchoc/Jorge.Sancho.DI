<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlackJack JS</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.13.6/underscore-min.js"></script>
    <style>
      .carta {
        width: 150px;
        margin-left: -30px;
      }
      .cartas-container {
        min-height: 200px;
        padding: 20px;
      }
    </style>
  </head>
  <body class="bg-success text-white text-center">
    <h1 class="mt-4">BlackJack</h1>

    <div class="row container-fluid mt-2">
      <div class="col">
        <button id="btnNuevo" class="btn btn-danger">Nuevo Juego</button>
        <button id="btnPedir" class="btn btn-primary">Pedir Carta</button>
        <button id="btnDetener" class="btn btn-primary">Plantarse</button>
      </div>
    </div>

    <div class="row container mt-4">
      <div class="col">
        <h3>Jugador - <small id="puntos-jugador">0</small></h3>
        <div id="jugador-cartas" class="cartas-container"></div>
      </div>
    </div>

    <div class="row container mt-4">
      <div class="col">
        <h3>Banca - <small id="puntos-banca">0</small></h3>
        <div id="banca-cartas" class="cartas-container"></div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
